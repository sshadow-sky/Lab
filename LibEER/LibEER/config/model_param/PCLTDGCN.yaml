# PCL-TDGCN model/training config for LibEER

params:
  # Model architecture
  layers: 2
  hidden_1: 256
  hidden_2: 64
  diffusion_step: 1
  dropout: 0.25
  cbam_reduction: 4
  cbam_kernel_size: 3
  topk_ratio: 0.8
  target_topk_ratio: 0.3
  temperature: 1.0
  ema_factor: 0.8

train:
  # Domain adaptation loss weights
  conf_threshold: 0.7
  consistency_weight: 0.2
  noise_std: 0.005
  boost_scale: 2.0

  # Optimizer/schedule
  optimizer: rmsprop
  weight_decay: 0.001
  lr_gamma: 10.0
  lr_decay_rate: 0.75

  # Runtime
  eval_interval: 10
  patience: 40
